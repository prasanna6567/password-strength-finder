<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Password Strength Analyzer and Breach Detector with privacy-first SHA-256 checks.">
  <title>{% block title %}Password Strength Analyzer &amp; Breach Detector{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <div class="bg-grid" aria-hidden="true"></div>

  <header class="site-header">
    <div class="container nav-shell">
      <a class="brand" href="{{ url_for('home') }}" aria-label="Password Strength Analyzer & Breach Detector Home">
        <span class="brand-mark" aria-hidden="true">&#9632;</span>
        <span class="brand-text">Password Shield</span>
      </a>
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="{{ url_for('home') }}" {% if page == 'home' %}aria-current="page"{% endif %}>Home</a>
        <a href="{{ url_for('breach_check') }}" {% if page == 'breach' %}aria-current="page"{% endif %}>Breach Check</a>
        <a href="{{ url_for('security_tips') }}" {% if page == 'tips' %}aria-current="page"{% endif %}>Security Tips</a>
        <a href="{{ url_for('about') }}" {% if page == 'about' %}aria-current="page"{% endif %}>About Project</a>
      </nav>
    </div>
  </header>

  <main id="main-content" class="container page-content">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container footer-shell">
      <p>Security disclaimer: Passwords are never stored. Hashing happens in your browser using SHA-256.</p>
      <p>&copy; <span id="currentYear"></span> Password Strength Analyzer &amp; Breach Detector</p>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
  {% block scripts %}{% endblock %}
</body>
</html>
